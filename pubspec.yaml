name: movie_explorer
description: "Floa Test"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # System
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # Framework
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1

  # I/O
  retrofit: ^4.9.2
  dio: ^5.9.2
  dio_cache_interceptor: ^3.5.1
  dio_cache_interceptor_hive_store: ^4.0.0
  json_annotation: ^4.11.0
  cached_network_image: ^3.4.1

  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi_web: ^1.1.1
  sqflite_common_ffi: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.13.1
  json_serializable: ^6.13.1
  retrofit_generator: ^10.2.5
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

